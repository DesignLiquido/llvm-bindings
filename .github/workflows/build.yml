name: Build

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '*.md'
      - 'LICENSE'

env:
  LLVM_VERSION: 14.0.6
  LLVM_VERSION_MAJOR: 14

jobs:
  build-push:
    if: github.event_name == 'push'
    name: Node.js ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-12, ubuntu-22.04, windows-2022 ]
        node: [ 22 ]
    steps:
      - name: Fetch Codebase
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
      - name: Install LLVM and Ninja on macOS
        if: startsWith(matrix.os, 'macos')
        run: |
          brew update
          brew install llvm@${{ env.LLVM_VERSION_MAJOR }} ninja
      - name: Install LLVM and Ninja on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo wget https://apt.llvm.org/llvm.sh
          sudo chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_VERSION_MAJOR }}
          sudo apt-get install ninja-build
      - name: Cache LLVM install
        if: startsWith(matrix.os, 'windows')
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-install
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.os }}-msvc
      - name: Build LLVM from source on Windows
        if: startsWith(matrix.os, 'windows') && steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          $LLVM_VERSION = "${{ env.LLVM_VERSION }}"
          curl -sLO "https://github.com/llvm/llvm-project/releases/download/llvmorg-$LLVM_VERSION/llvm-$LLVM_VERSION.src.tar.xz"
          tar -xf "llvm-$LLVM_VERSION.src.tar.xz"
          cmake -S "llvm-$LLVM_VERSION.src" -B llvm-build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$pwd/llvm-install" `
            -DLLVM_TARGETS_TO_BUILD=X86 `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DLLVM_BUILD_TOOLS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL
          cmake --build llvm-build --config Release --target install -j 4
      - name: Set LLVM_CMAKE_DIR on Windows
        if: startsWith(matrix.os, 'windows')
        run: |
          $LLVM_CMAKE_DIR = "$pwd/llvm-install/lib/cmake/llvm"
          if (-not (Test-Path $LLVM_CMAKE_DIR)) {
            Write-Error "LLVM CMake directory not found: $LLVM_CMAKE_DIR"
            exit 1
          }
          "LLVM_CMAKE_DIR=$LLVM_CMAKE_DIR" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install Dependencies
        run: npm install --ignore-scripts
      - name: CMake Build Debug and Test
        if: startsWith(matrix.os, 'windows') == false
        run: |
          npm run clear
          npm run build:debug
          npm test
      - name: CMake Build Release and Test on Windows
        if: startsWith(matrix.os, 'windows')
        run: |
          npm run clear
          npx cmake-js print-configure "--CDLLVM_DIR=$env:LLVM_CMAKE_DIR" '--CDCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL'
          npx cmake-js build "--CDLLVM_DIR=$env:LLVM_CMAKE_DIR" '--CDCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL'
          npm test
      - name: CMake Build Release and Test on non-Windows
        if: startsWith(matrix.os, 'windows') == false
        run: |
          npm run clear
          npm run build:release
          npm test

  build-pr:
    if: github.event_name == 'pull_request'
    name: Node.js ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-10.15, macos-11, macos-12, ubuntu-18.04, ubuntu-20.04, ubuntu-22.04, windows-2019, windows-2022 ]
        node: [ 18, 20, 22 ]
        exclude:
          - os: ubuntu-18.04
            node: 20
    steps:
      - name: Fetch Codebase
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
      - name: Install LLVM and Ninja on macOS
        if: startsWith(matrix.os, 'macos')
        run: |
          brew update
          brew install llvm@${{ env.LLVM_VERSION_MAJOR }} ninja
      - name: Install LLVM and Ninja on Ubuntu
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo wget https://apt.llvm.org/llvm.sh
          sudo chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_VERSION_MAJOR }}
          sudo apt-get install ninja-build
      - name: Cache LLVM install
        if: startsWith(matrix.os, 'windows')
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm-install
          key: llvm-${{ env.LLVM_VERSION }}-${{ matrix.os }}-msvc
      - name: Build LLVM from source on Windows
        if: startsWith(matrix.os, 'windows') && steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          $LLVM_VERSION = "${{ env.LLVM_VERSION }}"
          $VS_GENERATOR = if ("${{ matrix.os }}" -eq "windows-2019") { "Visual Studio 16 2019" } else { "Visual Studio 17 2022" }
          curl -sLO "https://github.com/llvm/llvm-project/releases/download/llvmorg-$LLVM_VERSION/llvm-$LLVM_VERSION.src.tar.xz"
          tar -xf "llvm-$LLVM_VERSION.src.tar.xz"
          cmake -S "llvm-$LLVM_VERSION.src" -B llvm-build `
            -G "$VS_GENERATOR" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$pwd/llvm-install" `
            -DLLVM_TARGETS_TO_BUILD=X86 `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DLLVM_BUILD_TOOLS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL
          cmake --build llvm-build --config Release --target install -j 4
      - name: Set LLVM_CMAKE_DIR on Windows
        if: startsWith(matrix.os, 'windows')
        run: |
          $LLVM_CMAKE_DIR = "$pwd/llvm-install/lib/cmake/llvm"
          if (-not (Test-Path $LLVM_CMAKE_DIR)) {
            Write-Error "LLVM CMake directory not found: $LLVM_CMAKE_DIR"
            exit 1
          }
          "LLVM_CMAKE_DIR=$LLVM_CMAKE_DIR" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Install Dependencies
        run: npm install --ignore-scripts
      - name: CMake Build Debug and Test
        if: startsWith(matrix.os, 'windows') == false
        run: |
          npm run clear
          npm run build:debug
          npm test
      - name: CMake Build Release and Test on Windows
        if: startsWith(matrix.os, 'windows')
        run: |
          npm run clear
          npx cmake-js print-configure "--CDLLVM_DIR=$env:LLVM_CMAKE_DIR" '--CDCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL'
          npx cmake-js build "--CDLLVM_DIR=$env:LLVM_CMAKE_DIR" '--CDCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL'
          npm test
      - name: CMake Build Release and Test on non-Windows
        if: startsWith(matrix.os, 'windows') == false
        run: |
          npm run clear
          npm run build:release
          npm test